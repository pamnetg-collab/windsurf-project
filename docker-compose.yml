version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: vpn_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
      POSTGRES_DB: vpn_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
